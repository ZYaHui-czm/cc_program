<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="随记" />
    <meta name="theme-color" content="#2563eb" />
    <script>
      (function(){
        var t=localStorage.getItem('memo-theme');
        var m=document.querySelector('meta[name="theme-color"]');
        if(m)m.setAttribute('content',t==='dark'?'#0f172a':'#2563eb');
        var a=document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if(a)a.setAttribute('content',t==='dark'?'black-translucent':'default');
      })();
    </script>
    <title>随记</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
